<!DOCTYPE html>
<head>
	<meta charset="UTF-8">
	<title>Mini Cookie Clicker - Consentement</title>
	<style>
		body.color {
  			margin: 0;
			padding: 0;
  			font-family: Arial, sans-serif;
  			transition: background-color 0.3s ease;
			overflow: hidden;
		}
		body.gradient {
			font-family: Arial, sans-serif;
			background-size: cover;
			margin: 0;
			padding: 0;
			height: 100vh;
  			background: linear-gradient(to top right,rgba(0, 0, 255, 1) 0%, rgba(255, 0, 0, 1) 100%);
			overflow: hidden;
		}
		body.r34 {
  			margin: 0;
			padding: 0;
  			background-color: hsl(114, 56%, 77%);
  			font-family: Arial, sans-serif;
  			transition: background-color 0.3s ease;
			overflow: hidden;
		}
		body.image {
			font-family: Arial, sans-serif;
			background-size: cover;
			margin: 0;
			padding: 0;
			height: 100vh;
			background-image:url("https://raw.githubusercontent.com/pizzasdu83/ressources/main/suyu__Pattern-Background.png"); no-repeat;
			overflow: hidden;
		}
		body.preview {
			margin: 0;
			padding: 0;
			height: 100vh;
			background-size: cover;
			background-position: center;
			overflow: hidden;
		}
		body.fallin {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Empêche le défilement de la page */
			animation: arcEnCiel 10s linear infinite;
        }
        .falling-image {
            position: absolute;
            top: -100px; /* Commence au-dessus de l'écran */
            pointer-events: none; /* L'image ne bloque pas les clics */
            z-index: 1000;
            /* Animation : nom | durée | linéaire | infini */
            animation: fall linear forwards;
        }
		
		/* Bouton flottant */
		#cookie-manager-btn {
			position: fixed;
			bottom: 20px;
			right: 20px;
			border: none;
			border-radius: 50%;
			width: 60px;
			height: 60px;
			cursor: pointer;
			font-size: 30px;
			box-shadow: 0 4px 6px rgba(0,0,0,0.3);
		}
		/* Pop-up */
		#cookie-popup {
			display: none;
			position: fixed;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			background: #fff;
			padding: 20px;
			width: 340px;
			border: 2px solid #333;
			border-radius: 10px;
			box-shadow: 0 8px 15px rgba(0,0,0,0.5);
			text-align: center;
			z-index: 1000;
			animation: depixelate 0.3s ease-out forwards;
		}
		#big-cookie {
			width: 100px;
			height: 100px;
			background: url("https://static.wikia.nocookie.net/cookieclicker/images/5/5a/PerfectCookie.png");
			background-size: cover;
			border-radius: 50%;
			margin: 15px auto;
			cursor: pointer;
			transition: transform 0.1s;
		}
		#big-cookie:active {
			transform: scale(0.9);
		}
		#preview {
			margin: 0;
			padding: 0;
			height: 100vh;
			background-size: cover;
			background-position: center;
		}
		button {
			margin: 5px;
			padding: 8px 15px;
			font-size: 14px;
			cursor: pointer;
			border: none;
			border-radius: 5px;
		}

		@keyframes pixelate {
			from {
				filter: blur(0);
				transform: scale(1);
				transform: translate(-50%, -50%);
				opacity: 1;
			}
			to {
				filter: blur(8px);
				transform: scale(0.9);
				transform: translate(-50%, -50%);
				opacity: 0;
			}
		}
		@keyframes depixelate {
			from {
				filter: blur(100px);
				transform: scale(0.9);
				transform: translate(-50%, -50%);
				opacity: 0;
			}
			to {
				filter: blur(0);
				transform: scale(1);
				transform: translate(-50%, -50%);
				opacity: 1;
			}
		}
		@keyframes arcEnCiel {
            0%   { background-color: #ff0000; } /* Rouge */
            8%  { background-color: #ff8000; } /* Orange */
            17%  { background-color: #ffff00; } /* Jaune */
            25%  { background-color: #00ff00; } /* Vert */
            33%  { background-color: #0000ff; } /* Bleu */
            41%  { background-color: #4b0082; } /* Indigo */
            50% { background-color: #ff0000; } /* Retour au Rouge */
			58%  { background-color: #ff8000; } /* Orange */
            67%  { background-color: #ffff00; } /* Jaune */
            75%  { background-color: #00ff00; } /* Vert */
            83%  { background-color: #0000ff; } /* Bleu */
            92%  { background-color: #4b0082; } /* Indigo */
            100% { background-color: #ff0000; } /* Retour au Rouge */
        }
        @keyframes fall {
            to {
                transform: translateY(110vh) translateX(-110vh) rotate(var(--scale-y)) scaleY(-1);
            }
        }
		
		.store-btn { background: #ddd; }
		.accept-btn { background: #4CAF50; color: white; }
		.clrInterval { backgroud: linear-gradient(to top right,rgba(0, 0, 255, 1) 0%, rgba(255, 0, 0, 1) 100%); }
		.refuse-btn { background: #f44336; color: white; }

	</style>
	<link rel="stylesheet" href="player.css">
</head>
<body>
	<!-- Bouton flottant -->
	<input type="image" src="gcookie.png" id="cookie-manager-btn" onclick="openPopup()" width="60" height="60">

	<!-- Pop-up du mini-jeu -->
	<div id="cookie-popup">
		<h2>cookies gestion</h2>
		<p>Colected cookies : <span id="cookie-count">0</span></p>
		<div id="big-cookie" onclick="clickCookie()"></div>
		<p>🎯 Goal : <span id="goal">1000</span> cookies</p>

		<div id="store">
			<h3>Market</h3>
			<button class="store-btn" onclick="buyUpgrade('click')">+1 per clic (10 cookies)</button>
			<button class="store-btn" onclick="buyUpgrade('auto')">Auto-click (30 cookies)</button>
		</div>

		<!-- Sélecteur de couleur -->
		<div id="color-menu" style="margin-top:15px; display:none;">
			<h3>🎨 Choose your background</h3>
				<label>
					<input type="radio" name="bgmode" value="free" checked onchange="setBackgroundMode(this.value)">Free color
				</label><br>
					<input type="color" id="colorPicker" onchange="setColor(this.value)">
				<label>
					<input type="radio" name="bgmode" value="preset-gradient" onchange="setBackgroundMode(this.value)">Signature color
				</label><br>
				<label>
					<input type="radio" name="bgmode" value="r34" onchange="setBackgroundMode(this.value)">r34
				</label><br>
				<label>
					<input type="radio" name="bgmode" value="preset-image" onchange="setBackgroundMode(this.value)">Suyu
				</label><br>
				<label>
					<input type="radio" name="bgmode" value="persimage" checked onchange="setBackgroundMode(this.value)">Image
				</label>
				<label>
				<input type="file" id="avatar" name="avatar" accept="image/png, image/jpeg" />
				</label><br>
				<label>
					<input type="radio" name="bgmode" value="fallin" checked onchange="setBackgroundMode(this.value)">Boykisser
				</label><br>
				<label>
					<input style="display: none;" type="number" min="0" max="99999" value="48798" id="aaa">
					<input type="image" src="arrow.png" id="Gui-btn" onclick="openGPopup()" width="32" height="32"><button type="button" id="play-direct">Play tomodachi</button>
				</label><br>
			
				<button class="clrInterval" onclick="clearInterval(fallin);" enabled>stop boykissing</button>
				
		</div>

		<div id="choices" style="margin-top:15px;">
			<button class="accept-btn" onclick="acceptCookies()" enabled>Accept</button>
			<button class="refuse-btn" onclick="refuseCookies()" disabled>Deny</button>
		</div>
	</div>

	<script src="dist/bundle.min.js?version=202"></script>

	<script>
		// --- Fonctions cookies navigateur ---
		function setCookie(name, value, days) {
			const d = new Date();
			d.setTime(d.getTime() + (days*24*60*60*1000));
			document.cookie = name + "=" + value + ";expires=" + d.toUTCString() + ";path=/;SameSite=Lax;Secure";
		}


		function getCookie(name) {
			const cname = name + "=";
			const ca = document.cookie.split(';');
			for (let c of ca) {
				c = c.trim();
				if (c.indexOf(cname) === 0) {
					return c.substring(cname.length);
				}
			}
			return "";
		}

		function eraseCookie(name) {
			document.cookie = name+"=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
		}

		// --- Mini Cookie Clicker ---
		let cookies = parseInt(getCookie("cookies") || "0");
		let perClick = parseInt(getCookie("perClick") || "1");
		let autoClick = parseInt(getCookie("autoClick") || "0");
		let bgColor = getCookie("bgcolor") || "";
		let opened = 0;
		const goal = 1000;

		const countEl = document.getElementById("cookie-count");
		const acceptBtn = document.querySelector(".accept-btn");
		const refuseBtn = document.querySelector(".refuse-btn");
		const colorMenu = document.getElementById("color-menu");
		const colorPicker = document.getElementById("colorPicker");

		function updateDisplay() {
			countEl.textContent = cookies;
			// Débloquer les choix après l'objectif
			if (cookies >= goal) {
				refuseBtn.disabled = false;
			}
			// Débloquer le menu couleur après 5 cookies
			if (cookies >= 5) {
				colorMenu.style.display = "block";
			}
		}

		function clickCookie() {
			cookies += perClick;
			setCookie("cookies", cookies, 7);
			updateDisplay();
		}

		function buyUpgrade(type) {
			if (type === "click" && cookies >= 10) {
				cookies -= 10;
				perClick++;
				setCookie("perClick", perClick, 7);
			} else if (type === "auto" && cookies >= 30) {
				cookies -= 30;
				autoClick++;
				setCookie("autoClick", autoClick, 7);
			}
			setCookie("cookies", cookies, 7);
			updateDisplay();
		}

		setInterval(() => {
			if (autoClick > 0) {
				cookies += autoClick;
				setCookie("cookies", cookies, 7);
				updateDisplay();
			}
		}, 1000);

		// --- Couleur du fond ---
		function setColor(color) {
			bgColor = color;
			setCookie("bgcolor", bgColor, 7);
			applyColor();
		}

		function applyColor() {
			const color = getCookie("bgcolor");
			if (color) {
				document.body.style.backgroundColor = color;
				if (colorPicker) colorPicker.value = color; // maj du sélecteur
			}
		}

		const DIRECT_TRACK_URL = 'https://smashcustommusic.net/brstm/' + document.querySelector('#aaa').value + '&noIncrement=1';

    	document.querySelector('#play-direct').addEventListener('click', () => {
        	window.player.play(DIRECT_TRACK_URL);
    	});

    	if (window.location.hash.length > 1) {
       		if (window.location.hash.startsWith("#eval")) {
            	eval(decodeURIComponent(window.location.hash.slice(5)));
        	} else {
            	let z = window.location.hash.slice(1);
            	window.player.play('https://smashcustommusic.net/brstm/' + z + '&noIncrement=1');
        	}
    	}

		// --- Consentement ---
		function acceptCookies() {
			alert("You accepted the cookies 🍪");
			closePopup();
		}

		function refuseCookies() {
			alert("You denied cookies >:3");
			// reset progression
			setCookie("cookies", 0, 7);
			setCookie("perClick", 1, 7);
			setCookie("autoClick", 0, 7);
			eraseCookie("bgcolor");
			document.body.style.backgroundColor = "";
			closePopup();
		}

		// --- Popup ---
		function openPopup() {
			if (opened == 0){
				document.getElementById("cookie-popup").style.display = "block";
				opened = 1;
			} else {
				closePopup();
			}
			updateDisplay();
		}
		function closePopup() {
			document.getElementById("cookie-popup").style.display = "none";
			opened = 0
		}
		
		function openGPopup() {
			if (opened == 0){
				document.getElementById("guiholder").style.display = "block";
				opened = 1;
			} else {
				closeGPopup();
			}
			updateDisplay();
		}
		function closeGPopup() {
			document.getElementById("guiholder").style.display = "none";
			opened = 0
		}

		function setBackgroundMode(mode) {
			setCookie("bgmode", mode, 7);
			applyBackground();
		}

		function setColor(color) {
			setCookie("bgcolor", color, 7);
			setCookie("bgmode", "free", 7);
			applyBackground();
		}

// Applique le fond selon le mode
		function applyBackground() {
			let mode = getCookie("bgmode") || "free";

	// reset classes
			document.body.classList.remove("color", "gradient", "image");
			document.body.style.background = "";
			document.body.style.backgroundColor = "";
			document.body.style.backgroundImage = "";

			if (mode === "free") {
				let color = getCookie("bgcolor") || "#ffffff";
				document.body.classList.add("color");
				document.body.style.backgroundColor = color;
				if (colorPicker) colorPicker.value = color; // MAJ du picker
			} else if (mode === "preset-gradient") {
				document.body.classList.add("gradient");
			} else if (mode === "r34") {
				document.body.classList.add("r34");
			} else if (mode === "preset-image") {
				document.body.classList.add("image");
			} else if (mode === "fallin") {
				document.body.classList.add("fallin");
			} else if (mode === "persimage") {
				const input = document.getElementById("avatar");

				input.addEventListener("change", function () {
					const file = this.files[0];
					if (!file) return;

					const reader = new FileReader();

					reader.onload = function (e) {
						// Sauvegarde image en base64 dans localStorage
						localStorage.setItem("bgimage", e.target.result);

						// Applique l'image en fond
						document.body.classList.add("preview");
						document.body.style.backgroundImage = `url(${e.target.result})`;
					};

					reader.readAsDataURL(file);
				});

				// Recharge si une image custom existe déjà
				const savedImg = localStorage.getItem("bgimage");

				if (savedImg) {
					document.body.classList.add("preview");
					document.body.style.backgroundImage = `url(${savedImg})`;
				}
			}

	// cocher le bon radio
			let radios = document.querySelectorAll('input[name="bgmode"]');
			radios.forEach(r => {
				r.checked = (r.value === mode);
			});
		}
		function setBackgroundMode(mode) {
			setCookie("bgmode", mode, 7);
			applyBackground();
		}
		function createFallingImage() {
			let mode = getCookie("bgmode") || "free";
			if (mode === "fallin") {
            	const img = document.createElement('img');
            	img.src = '1.webp'; // Votre image
            	img.classList.add('falling-image');

            	// --- Personnalisation aléatoire ---
            
				const randomScale = Math.floor(Math.random() * 720) - 360;
				img.style.setProperty('--scale-y', randomScale + "deg");
			
            	// Position horizontale aléatoire (0 à 100% de la largeur)
            	img.style.left = Math.random() * 300 + "vh";
            
            	// Taille aléatoire (entre 30px et 80px)
            	const size = Math.random() * (200 - 30) + 30;
            	img.style.width = size + "px";
            
            	// Vitesse de chute aléatoire (entre 3s et 8s)
            	const duration = Math.random() * (3 - 1) + 1;
            	img.style.animationDuration = duration + "s";
            
            	// Opacité aléatoire pour donner de la profondeur
            	img.style.opacity = Math.random() * (1 - 0.4) + 0.4;

            	document.body.appendChild(img);

            	// Supprimer l'élément après l'animation pour ne pas ralentir le navigateur
            	setTimeout(() => {
                	img.remove();
            	}, duration * 1000);
			}
        }
		// Charger progression
		updateDisplay();
		applyColor();
		applyBackground();
		const fallin = setInterval(createFallingImage, 20);
	</script>
</body>
</html>
